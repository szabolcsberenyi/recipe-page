<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Regisztráció</title>
</head>
<body>
    
    <div id="header">
        <h1 class="title">Regisztráció</h1>
        <a href="../index.html" class="return">Vissza a főoldalra</a>
    </div>
    
    <div class="main">
        <div class="decoration-image">
            <img src="logo.png" alt="image is not available">
        </div>
        <form action="../index.html" method="post">
                <div id="registration-panel">
                    <div id="first-name-panel" class="input-field">
                        <label for="first-name">Keresztnév</label>
                        <input type="text" name="" id="first-name">
                    </div>
                    <div id="family-name-panel" class="input-field">
                        <label for="family-name">Családnév:</label>
                        <input type="text" name="" id="family-name"><br>
                    </div>
                    <div id="email-panel" class="input-field">
                        <label for="email-adress">Email-cím:</label>
                        <input type="email" name="" id="email-adress"> <br>
                    </div>
                    <div id="password-panel" class="input-field">
                        <label for="password">Jelszó:</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div id="password-repeat-panel" class="input-field">
                        <label for="password-repeat">Jelszó ismét:</label>
                        <input type="password" name="password-repeat" id="password-repeat">
                    </div>
                </div>

                <button type="submit">Regisztráció</button>
                <button type="reset">Törlés</button> <br>
        </form>
    </div>

</body>
</html>
