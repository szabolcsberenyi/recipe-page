<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header">
            <p class="title"><strong>Receptek</strong></p>
            <div class="loginpanel">
                <a href="login.html">Bejelentkezés</a><br>
                <a href="registration/registration.html">Regisztráció</a>
            </div>
        </div>
    </header>

    <div class="page">
 
        <div class="sidebar">
            <ul class="options">
                <span><p>Opciók:</p></span><br>
                <li><input type="checkbox" name="azsiai" id="azsiai"><label for="azsiai">Ázsiai</label></li><br>
                <li><input type="checkbox" name="amerikai" id="amerikai"><label for="amerikai">Amerikai</label></li><br>
                <li><input type="checkbox" name="fastfood" id="fastfood"><label for="fastfood">Gyorskaja</label></li><br>
                <li><input type="checkbox" name="dessert" id="dessert"><label for="dessert">Desszert</label></li><br>
            </ul>
        </div>

        <div class="main">
            <div id="recipe-view">
                <div id="page-turn">
                    <a href="" id="first-page">1</a>
                    <span>...</span>
                    <a href="" id="previous-page-num">2</a>
                    <a href="" id="current-page-num">3</a>
                    <a href="" id="next-page-num">4</a>
                    <span>...</span>
                    <a href="" id="last-page">13</a>

                </div>
                <div id="recipe-per-page">
                    <label for="recipe-number">recept/sor:</label>
                    <select  name="recipe-number" id="recipe-number">
                        <option value="3">3</option>
                        <option value="4" selected="selected">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>
            <div id="recipes">

            </div>

        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
